server {
        server_name ocr.reb00t.io;

        # Allow PDF uploads up to the same limit the Flask app enforces
        # (OCR_MAX_UPLOAD_MB, default 50 MB). Without this nginx rejects
        # anything larger than 1 MB with 413 before it ever reaches the
        # app, and the user sees the bare nginx error HTML.
        client_max_body_size 50M;

        gzip on;
        gzip_proxied any;
        gzip_types
          text/css
          text/javascript
          text/plain
          text/xml
          application/javascript
          application/x-javascript
          application/json;

        location / {
          proxy_pass http://localhost:28088;

          proxy_set_header Host $host;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "Upgrade";
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_http_version 1.1;
          proxy_cache_bypass $http_upgrade;

          # Upload + OCR of a 50 MB PDF on a slow VLM can easily take
          # several minutes; bump the proxy timeouts so nginx doesn't
          # give up halfway through and return 504.
          proxy_connect_timeout 30s;
          proxy_send_timeout    600s;
          proxy_read_timeout    600s;
          proxy_request_buffering off;
        }
}
