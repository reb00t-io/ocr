services:
  ocr:
    image: ocr
    environment:
      - PORT=${PORT}
      - MISTRAL_API_KEY
      - MISTRAL_API_URL
      - MISTRAL_OCR_MODEL
      - LLM_BASE_URL
      - LLM_API_KEY
      - LLM_MODEL
      - AUTH_PASSWORD
      - OCR_FILE_TTL_SECONDS
      - OCR_MAX_UPLOAD_MB
    ports:
      - "${PORT}:${PORT}"
